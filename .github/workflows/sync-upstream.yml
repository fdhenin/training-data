name: Sync from CrankAddict

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch updated files from CrankAddict
        run: |
          BASE="https://raw.githubusercontent.com/CrankAddict/section-11/main"
          
          # Fichiers à la racine
          curl -sf -o "SECTION_11.md" "$BASE/SECTION_11.md" && echo "✅ SECTION_11.md" || echo "⚠️ SECTION_11.md"
          curl -sf -o "SKILL.md" "$BASE/SKILL.md" && echo "✅ SKILL.md" || echo "⚠️ SKILL.md"
          curl -sf -o "SETUP_ASSISTANT.md" "$BASE/SETUP_ASSISTANT.md" && echo "✅ SETUP_ASSISTANT.md" || echo "⚠️ SETUP_ASSISTANT.md"
          curl -sf -o "DOSSIER_TEMPLATE.md" "$BASE/DOSSIER_TEMPLATE.md" && echo "✅ DOSSIER_TEMPLATE.md" || echo "⚠️ DOSSIER_TEMPLATE.md"
          curl -sf -o "manifest.json" "$BASE/manifest.json" && echo "✅ manifest.json" || echo "⚠️ manifest.json"
          curl -sf -o "changelog.json" "$BASE/changelog.json" && echo "✅ changelog.json" || echo "⚠️ changelog.json"
          
          # sync.py est dans examples/json-auto-sync/
          curl -sf -o "sync.py" "$BASE/examples/json-auto-sync/sync.py" && echo "✅ sync.py" || echo "⚠️ sync.py"
          
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add SECTION_11.md SKILL.md SETUP_ASSISTANT.md DOSSIER_TEMPLATE.md manifest.json changelog.json sync.py
          
          if ! git diff --staged --quiet; then
            git commit -m "Sync from CrankAddict upstream - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Fichiers mis à jour"
          else
            echo "⏭️ Aucune mise à jour"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
